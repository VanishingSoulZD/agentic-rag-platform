- name: Generate Summary via Gemini
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. 获取并转义 Diff
          git diff HEAD^ HEAD > diff.txt
          DIFF_JSON=$(jq -Rs . < diff.txt)

          # 2. 构造 JSON Payload
          # 修正：确保模型名称正确
          PAYLOAD=$(jq -n --arg diff "$DIFF_JSON" '{
            contents: [{
              parts: [{
                text: ("你是一个资深工程师。请根据以下代码差异生成一个中文 PR 描述。包含：1.改动概要 2.主要变化 3.来源标记（加上 #CursorGenerated）。代码差异如下：\n" + $diff)
              }]
            }]
          }')

          # 3. 调用 API (修正了模型名称为 gemini-1.5-flash-latest)
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY}" \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD")

          echo "API Response: $RESPONSE"

          # 4. 解析结果 (增加了对错误信息的防御)
          SUMMARY=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [ -z "$SUMMARY" ]; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // "Unknown Error"')
            SUMMARY="AI 生成失败。原因：$ERROR_MSG"
          fi

          # 5. 写入环境变量
          {
            echo "SUMMARY<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_ENV"
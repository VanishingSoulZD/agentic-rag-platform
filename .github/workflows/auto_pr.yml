name: Cursor PR Specialist

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  cursor-job:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.title, 'cursor') || startsWith(github.head_ref, 'cursor')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 获取最近两次提交以对比差异

      # 1. 物理打标签
      - name: Add Physical Label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['cursor'] 
            })

      # 2. 获取代码差异 (Diff) 并调用 Gemini 生成描述
      - name: Generate Summary via Gemini
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 获取 Diff 内容并限制大小防止超过 API 限制
          git diff HEAD^ HEAD > diff.txt
          DIFF_CONTENT=$(cat diff.txt | head -c 5000) 

          # 使用 curl 直接调用 Gemini API
          RESPONSE=$(curl https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY} \
              -H 'Content-Type: application/json' \
              -X POST \
              -d '{
                "contents": [{
                  "parts":[{
                    "text": "你是一个资深工程师。请根据以下代码差异生成一个中文 PR 描述。包含：1.改动概要 2.主要变化 3.来源标记（加上 #CursorGenerated）。代码差异如下：\n'"${DIFF_CONTENT}"'"
                  }]
                }]
              }')
          
          # 提取 AI 返回的文本并存入环境变量
          SUMMARY=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text')
          
          # 将结果传递给下一步，处理换行符问题
          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 3. 更新 PR 描述
      - name: Update PR Body
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: process.env.SUMMARY
            })